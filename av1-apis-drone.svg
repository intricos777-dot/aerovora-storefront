<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg"><stop offset="0%" stop-color="#1a1a2a"/><stop offset="100%" stop-color="#0a0a0f"/></radialGradient>
    <radialGradient id="glow"><stop offset="0%" stop-color="#00e5a0" stop-opacity="0.15"/><stop offset="100%" stop-color="#00e5a0" stop-opacity="0"/></radialGradient>
    <radialGradient id="glow2"><stop offset="0%" stop-color="#7c5cfc" stop-opacity="0.1"/><stop offset="100%" stop-color="#7c5cfc" stop-opacity="0"/></radialGradient>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2a2a4e"/><stop offset="100%" stop-color="#16161f"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00e5a0" flood-opacity="0.15"/></filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <ellipse cx="400" cy="520" rx="280" ry="30" fill="url(#glow)"/>
  <ellipse cx="400" cy="520" rx="200" ry="20" fill="url(#glow2)"/>

  <!-- Arms -->
  <g filter="url(#shadow)">
    <line x1="400" y1="290" x2="620" y2="150" stroke="#2a2a3e" stroke-width="12" stroke-linecap="round"/>
    <line x1="400" y1="290" x2="620" y2="150" stroke="#3a3a5e" stroke-width="6" stroke-linecap="round"/>
    <line x1="400" y1="290" x2="180" y2="150" stroke="#2a2a3e" stroke-width="12" stroke-linecap="round"/>
    <line x1="400" y1="290" x2="180" y2="150" stroke="#3a3a5e" stroke-width="6" stroke-linecap="round"/>
    <line x1="400" y1="290" x2="700" y2="320" stroke="#1a1a2a" stroke-width="12" stroke-linecap="round"/>
    <line x1="400" y1="290" x2="700" y2="320" stroke="#3a3a5e" stroke-width="6" stroke-linecap="round"/>
    <line x1="400" y1="290" x2="100" y2="320" stroke="#1a1a2a" stroke-width="12" stroke-linecap="round"/>
    <line x1="400" y1="290" x2="100" y2="320" stroke="#3a3a5e" stroke-width="6" stroke-linecap="round"/>
    <line x1="400" y1="290" x2="580" y2="460" stroke="#1a1a2a" stroke-width="12" stroke-linecap="round"/>
    <line x1="400" y1="290" x2="580" y2="460" stroke="#3a3a5e" stroke-width="6" stroke-linecap="round"/>
    <line x1="400" y1="290" x2="220" y2="460" stroke="#1a1a2a" stroke-width="12" stroke-linecap="round"/>
    <line x1="400" y1="290" x2="220" y2="460" stroke="#3a3a5e" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Motor housings -->
  <g>
    <circle cx="620" cy="150" r="28" fill="#1a1a2a" stroke="#4a4a6e" stroke-width="2"/>
    <circle cx="620" cy="150" r="22" fill="#22223a"/>
    <circle cx="620" cy="150" r="8" fill="#0a0a1a" stroke="#00e5a0" stroke-width="1"/>
    <ellipse cx="620" cy="150" rx="65" ry="18" fill="rgba(0,229,160,0.06)" stroke="rgba(0,229,160,0.15)" stroke-width="0.5"/>
    <ellipse cx="620" cy="150" rx="65" ry="18" fill="none" stroke="rgba(0,229,160,0.03)" stroke-width="1" transform="rotate(45 620 150)" class="rotor-spin"/>

    <circle cx="180" cy="150" r="28" fill="#1a1a2a" stroke="#4a4a6e" stroke-width="2"/>
    <circle cx="180" cy="150" r="22" fill="#22223a"/>
    <circle cx="180" cy="150" r="8" fill="#0a0a1a" stroke="#00e5a0" stroke-width="1"/>
    <ellipse cx="180" cy="150" rx="65" ry="18" fill="rgba(0,229,160,0.06)" stroke="rgba(0,229,160,0.15)" stroke-width="0.5"/>

    <circle cx="700" cy="320" r="28" fill="#1a1a2a" stroke="#4a4a6e" stroke-width="2"/>
    <circle cx="700" cy="320" r="22" fill="#22223a"/>
    <circle cx="700" cy="320" r="8" fill="#0a0a1a" stroke="#00e5a0" stroke-width="1"/>
    <ellipse cx="700" cy="320" rx="65" ry="18" fill="rgba(0,229,160,0.06)" stroke="rgba(0,229,160,0.15)" stroke-width="0.5"/>

    <circle cx="100" cy="320" r="28" fill="#1a1a2a" stroke="#4a4a6e" stroke-width="2"/>
    <circle cx="100" cy="320" r="22" fill="#22223a"/>
    <circle cx="100" cy="320" r="8" fill="#0a0a1a" stroke="#00e5a0" stroke-width="1"/>
    <ellipse cx="100" cy="320" rx="65" ry="18" fill="rgba(0,229,160,0.06)" stroke="rgba(0,229,160,0.15)" stroke-width="0.5"/>

    <circle cx="580" cy="460" r="28" fill="#1a1a2a" stroke="#4a4a6e" stroke-width="2"/>
    <circle cx="580" cy="460" r="22" fill="#22223a"/>
    <circle cx="580" cy="460" r="8" fill="#0a0a1a" stroke="#00e5a0" stroke-width="1"/>
    <ellipse cx="580" cy="460" rx="65" ry="18" fill="rgba(0,229,160,0.06)" stroke="rgba(0,229,160,0.15)" stroke-width="0.5"/>

    <circle cx="220" cy="460" r="28" fill="#1a1a2a" stroke="#4a4a6e" stroke-width="2"/>
    <circle cx="220" cy="460" r="22" fill="#22223a"/>
    <circle cx="220" cy="460" r="8" fill="#0a0a1a" stroke="#00e5a0" stroke-width="1"/>
    <ellipse cx="220" cy="460" rx="65" ry="18" fill="rgba(0,229,160,0.06)" stroke="rgba(0,229,160,0.15)" stroke-width="0.5"/>
  </g>

  <!-- Central Body -->
  <ellipse cx="400" cy="290" rx="90" ry="70" fill="url(#bodyGrad)" stroke="#4a4a6e" stroke-width="2" filter="url(#shadow)"/>
  <ellipse cx="400" cy="290" rx="75" ry="58" fill="#1e1e30" stroke="#2a2a4e" stroke-width="1"/>

  <!-- NVIDIA Jetson housing -->
  <rect x="355" y="260" width="90" height="40" rx="6" fill="#0a0a1a" stroke="#7c5cfc" stroke-width="2"/>
  <text x="400" y="285" text-anchor="middle" fill="#7c5cfc" font-size="10" font-weight="700" font-family="monospace">JETSON ORIN NX</text>
  <text x="400" y="296" text-anchor="middle" fill="#4a4a6e" font-size="7" font-family="monospace">16GB · 100 TOPS</text>

  <!-- RTK GPS -->
  <rect x="370" y="238" width="60" height="16" rx="4" fill="#0a0a1a" stroke="#00e5a0" stroke-width="1.5"/>
  <text x="400" y="250" text-anchor="middle" fill="#00e5a0" font-size="7" font-weight="600" font-family="monospace">RTK GPS ±2.5cm</text>

  <!-- Status LEDs -->
  <circle cx="368" cy="320" r="5" fill="#00e5a0" opacity="0.9"/>
  <circle cx="400" cy="320" r="5" fill="#f0a030" opacity="0.9"/>
  <circle cx="432" cy="320" r="5" fill="#ff4060" opacity="0.9"/>
  <text x="368" y="338" text-anchor="middle" fill="#4a4a6e" font-size="6" font-family="monospace">PWR</text>
  <text x="400" y="338" text-anchor="middle" fill="#4a4a6e" font-size="6" font-family="monospace">AI</text>
  <text x="432" y="338" text-anchor="middle" fill="#4a4a6e" font-size="6" font-family="monospace">ERR</text>

  <!-- Payload Module -->
  <ellipse cx="400" cy="360" rx="55" ry="30" fill="#1a1a2a" stroke="#5a5a7e" stroke-width="2"/>
  <ellipse cx="400" cy="360" rx="48" ry="24" fill="#22223a" stroke="#4a4a6e" stroke-width="1"/>
  <rect x="365" y="348" width="70" height="16" rx="3" fill="#2a2a4e" stroke="#6a6a8e" stroke-width="0.5"/>
  <text x="400" y="359" text-anchor="middle" fill="#8888a0" font-size="7" font-weight="600" font-family="monospace">PAYLOAD BAY</text>
  <circle cx="380" cy="370" r="6" fill="none" stroke="#00e5a0" stroke-width="1.5"/>
  <circle cx="400" cy="370" r="6" fill="none" stroke="#00e5a0" stroke-width="1.5"/>
  <circle cx="420" cy="370" r="6" fill="none" stroke="#00e5a0" stroke-width="1.5"/>

  <!-- Landing Gear -->
  <line x1="340" y1="390" x2="310" y2="440" stroke="#2a2a3e" stroke-width="5" stroke-linecap="round"/>
  <line x1="460" y1="390" x2="490" y2="440" stroke="#2a2a3e" stroke-width="5" stroke-linecap="round"/>
  <line x1="295" y1="440" x2="325" y2="440" stroke="#3a3a5e" stroke-width="4" stroke-linecap="round"/>
  <line x1="475" y1="440" x2="505" y2="440" stroke="#3a3a5e" stroke-width="4" stroke-linecap="round"/>
  <line x1="310" y1="440" x2="310" y2="460" stroke="#2a2a3e" stroke-width="3" stroke-linecap="round"/>
  <line x1="490" y1="440" x2="490" y2="460" stroke="#2a2a3e" stroke-width="3" stroke-linecap="round"/>

  <!-- Battery Bay -->
  <rect x="360" y="390" width="80" height="14" rx="3" fill="#0a0a1a" stroke="#00e5a0" stroke-width="1" opacity="0.7"/>
  <text x="400" y="400" text-anchor="middle" fill="#00e5a0" font-size="6" font-weight="600" font-family="monospace">6S 22,000mAh Li-Ion</text>

  <!-- Bottom label -->
  <text x="400" y="550" text-anchor="middle" fill="#4a4a6e" font-size="18" font-weight="700" font-family="monospace">AV-1 APIS</text>
  <text x="400" y="570" text-anchor="middle" fill="#3a3a5e" font-size="10" font-family="monospace">AUTONOMOUS PLANT CARETAKING DRONE · AEROVORA INDUSTRIES</text>
</svg>
